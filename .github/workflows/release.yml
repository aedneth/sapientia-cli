name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies (zero-trust)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # .npmrc sets ignore-scripts=true (zero-trust), which also gates `pnpm rebuild`
      # regardless of env/flags. Invoke better-sqlite3's own build directly instead:
      # prebuild-install fetches the official prebuilt binary; node-gyp compiles as a
      # fallback. This is the only path that actually produces the native binding.
      - name: Rebuild trusted native modules (better-sqlite3)
        shell: bash
        run: |
          BSDIR="$(node -e "const p=require('path');process.stdout.write(p.dirname(require.resolve('better-sqlite3/package.json',{paths:[p.join(process.cwd(),'packages/core')]})))")"
          cd "$BSDIR"
          PATH="$PWD/node_modules/.bin:$PATH" sh -c 'prebuild-install || node-gyp rebuild --release'

      - name: Dependency security audit
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
