name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Zero-trust install: --ignore-scripts blocks postinstall worms.
      # pnpm respects the ignore-scripts flag from .npmrc or via CLI.
      - name: Install dependencies (zero-trust)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # better-sqlite3 ships native bindings compiled at install time.
      # Whitelisted: source-available, embedded SQLite3, no network calls.
      - name: Rebuild trusted native modules
        run: pnpm rebuild better-sqlite3
        env:
          npm_config_ignore_scripts: 'false'

      # pnpm audit for supply chain scanning
      - name: Dependency security audit
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Smoke test (manifest + exit codes)
        shell: bash
        run: |
          node packages/cli/dist/sapientia.js manifest --json > /dev/null
          node packages/cli/dist/sapientia.js --version
