name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Zero-trust install: --ignore-scripts blocks postinstall worms.
      # pnpm respects the ignore-scripts flag from .npmrc or via CLI.
      - name: Install dependencies (zero-trust)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # better-sqlite3 ships native bindings compiled at install time.
      # Whitelisted: source-available, embedded SQLite3.
      # .npmrc sets ignore-scripts=true (zero-trust), which also gates `pnpm rebuild`
      # regardless of env/flags — so invoke better-sqlite3's own build directly:
      # prebuild-install fetches the official prebuilt binary; node-gyp is the fallback.
      - name: Rebuild trusted native modules (better-sqlite3)
        shell: bash
        run: |
          BSDIR="$(node -e "const p=require('path');process.stdout.write(p.dirname(require.resolve('better-sqlite3/package.json',{paths:[p.join(process.cwd(),'packages/core')]})))")"
          cd "$BSDIR"
          PATH="$PWD/node_modules/.bin:$PATH" sh -c 'prebuild-install || node-gyp rebuild --release'

      # pnpm audit for supply chain scanning
      - name: Dependency security audit
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Smoke test (manifest + exit codes)
        shell: bash
        run: |
          node packages/cli/dist/sapientia.js manifest --json > /dev/null
          node packages/cli/dist/sapientia.js --version
