name: Bug report
description: Report a problem with Sapientia
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the command you ran.
      placeholder: "I ran `sapientia search ...` and ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include `--json` output and exit code if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sapientia version (`sapientia --version`)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and Node version
    validations:
      required: true
